# docker-compose.yml
# Development and sandbox environment for MySQL MCP Server
# Optimized for Apple Silicon (arm64) - use platform: linux/arm64 for native performance
#
# Usage:
#   Start the sandbox: docker compose up -d
#   Stop the sandbox:  docker compose down
#
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-mcp-sandbox-db
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_sandbox_data:/var/lib/mysql
      - ./tests/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./tests/sql/sakila-schema.sql:/docker-entrypoint-initdb.d/02-sakila-schema.sql:ro
      - ./tests/sql/sakila-data.sql:/docker-entrypoint-initdb.d/03-sakila-data.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpass" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  mysql-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysql-mcp-sandbox-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_DSN: "root:testpass@tcp(mysql:3306)/testdb?parseTime=true"
      MYSQL_MCP_EXTENDED: "1" # Enable extended features for sandbox
      MYSQL_MCP_HTTP: "1"     # Enable HTTP REST API mode
    ports:
      - "9306:9306"
    # The entrypoint is defined in the Dockerfile.
    # The application reads from stdin and writes to stdout.
    # To interact with it, you can use 'docker attach' or 'docker run -i'.
    # For example:
    #   docker attach mysql-mcp-sandbox-server
    # Or send a command directly:
    #   echo "SELECT * FROM sakila.actor LIMIT 10;" | docker exec -i mysql-mcp-sandbox-server /mysql-mcp-server

volumes:
  mysql_sandbox_data:

networks:
  default:
    name: mysql-mcp-sandbox-network
