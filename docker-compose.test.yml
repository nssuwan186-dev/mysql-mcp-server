# docker-compose.test.yml
# MySQL test environment for integration testing
# Optimized for Apple Silicon (arm64) - use platform: linux/arm64 for native performance
#
# Usage:
#   Start all MySQL versions:   docker compose -f docker-compose.test.yml up -d
#   Stop all:                   docker compose -f docker-compose.test.yml down
#   Run tests against MySQL 8.0: MYSQL_TEST_DSN="mcpuser:mcppass00@tcp(127.0.0.1:13306)/testdb?parseTime=true" go test -tags=integration ./...
#   Run tests against MySQL 8.4: MYSQL_TEST_DSN="mcpuser:mcppass00@tcp(127.0.0.1:3307)/testdb?parseTime=true" go test -tags=integration ./...
#   Run tests against MySQL 9.0: MYSQL_TEST_DSN="mcpuser:mcppass00@tcp(127.0.0.1:3308)/testdb?parseTime=true" go test -tags=integration ./...
#
# Sakila Database:
#   The Sakila sample database is also loaded for realistic integration testing.
#   Access via: MYSQL_SAKILA_DSN="mcpuser:mcppass00@tcp(127.0.0.1:13306)/sakila?parseTime=true"
#
# SSH tunnel integration test (issue #79):
#   Start MySQL + bastion:  docker compose -f docker-compose.test.yml up -d mysql80 ssh_bastion
#   Run SSH test:  make test-integration-ssh  (or set MYSQL_SSH_* and MYSQL_SSH_TEST_DSN and run test)

services:
  # MySQL 8.0 - LTS version
  mysql80:
    image: mysql:8.0
    platform: linux/arm64
    container_name: mysql-mcp-test-80
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      # Host 13306 avoids clashing with a local MySQL install on 3306 (common on dev machines).
      - "13306:3306"
    volumes:
      - mysql80_data:/var/lib/mysql
      - ./tests/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./tests/sql/sakila-schema.sql:/docker-entrypoint-initdb.d/02-sakila-schema.sql:ro
      - ./tests/sql/sakila-data.sql:/docker-entrypoint-initdb.d/03-sakila-data.sql:ro
      - ./tests/sql/mcp_test_user.sql:/docker-entrypoint-initdb.d/04-mcp-test-user.sql:ro
      - ./tests/sql/mcp_test_user_sakila.sql:/docker-entrypoint-initdb.d/05-mcp-test-user-sakila.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpass" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # MySQL 8.4 - Innovation release
  mysql84:
    image: mysql:8.4
    platform: linux/arm64
    container_name: mysql-mcp-test-84
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3307:3306"
    volumes:
      - mysql84_data:/var/lib/mysql
      - ./tests/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./tests/sql/sakila-schema.sql:/docker-entrypoint-initdb.d/02-sakila-schema.sql:ro
      - ./tests/sql/sakila-data.sql:/docker-entrypoint-initdb.d/03-sakila-data.sql:ro
      - ./tests/sql/mcp_test_user.sql:/docker-entrypoint-initdb.d/04-mcp-test-user.sql:ro
      - ./tests/sql/mcp_test_user_sakila.sql:/docker-entrypoint-initdb.d/05-mcp-test-user-sakila.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpass" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # MySQL 9.0 - Latest innovation release
  mysql90:
    image: mysql:9.0
    platform: linux/arm64
    container_name: mysql-mcp-test-90
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3308:3306"
    volumes:
      - mysql90_data:/var/lib/mysql
      - ./tests/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./tests/sql/sakila-schema.sql:/docker-entrypoint-initdb.d/02-sakila-schema.sql:ro
      - ./tests/sql/sakila-data.sql:/docker-entrypoint-initdb.d/03-sakila-data.sql:ro
      - ./tests/sql/mcp_test_user.sql:/docker-entrypoint-initdb.d/04-mcp-test-user.sql:ro
      - ./tests/sql/mcp_test_user_sakila.sql:/docker-entrypoint-initdb.d/05-mcp-test-user-sakila.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpass" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # SSH bastion for tunnel integration tests (reachable as mysql80:3306 from bastion)
  ssh_bastion:
    build:
      context: ./tests/integration/ssh_bastion
      dockerfile: Dockerfile
    image: mysql-mcp-test-ssh-bastion
    container_name: mysql-mcp-test-ssh-bastion
    ports:
      - "2222:22"
    depends_on:
      mysql80:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sshd", "-t"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  # MariaDB 11.4 - Latest stable
  mariadb11:
    image: mariadb:11.4
    platform: linux/arm64
    container_name: mysql-mcp-test-mariadb-11
    environment:
      MARIADB_ROOT_PASSWORD: testpass
      MARIADB_DATABASE: testdb
      MARIADB_USER: testuser
      MARIADB_PASSWORD: testpass
    ports:
      - "3310:3306"
    volumes:
      - mariadb11_data:/var/lib/mysql
      - ./tests/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./tests/sql/sakila-schema.sql:/docker-entrypoint-initdb.d/02-sakila-schema.sql:ro
      - ./tests/sql/sakila-data.sql:/docker-entrypoint-initdb.d/03-sakila-data.sql:ro
      - ./tests/sql/mcp_test_user.sql:/docker-entrypoint-initdb.d/04-mcp-test-user.sql:ro
      - ./tests/sql/mcp_test_user_sakila.sql:/docker-entrypoint-initdb.d/05-mcp-test-user-sakila.sql:ro
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-ptestpass" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql80_data:
  mysql84_data:
  mysql90_data:
  mariadb11_data:


networks:
  default:
    name: mysql-mcp-test-network
